<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temple Trap Solver</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>🏛 Temple Trap Solver</h1>
      <p class="subtitle">A* pathfinding visualizer — sliding tiles + a pawn escaping through a two-layer temple.</p>
    </header>

    <div class="layout">
      <aside class="panel">
        <label for="level-select">Level</label>
        <select id="level-select"></select>

        <button id="solve-btn">Solve</button>

        <div id="stats" class="stats"></div>

        <div class="controls">
          <button id="prev-btn" title="Previous step">⏮</button>
          <button id="play-btn" title="Play / Pause">▶</button>
          <button id="next-btn" title="Next step">⏭</button>
          <button id="reset-btn" title="Reset to start">⟲</button>
        </div>

        <div class="speed-row">
          <label for="speed">Speed</label>
          <input type="range" id="speed" min="100" max="1500" value="500" step="50">
        </div>

        <div class="progress-row">
          <span id="step-label">Step 0 / 0</span>
          <input type="range" id="step-slider" min="0" max="0" value="0" step="1">
        </div>

        <h3>Move Log</h3>
        <ol id="move-log" class="move-log"></ol>
      </aside>

      <main class="board-wrap">
        <canvas id="board" width="480" height="480"></canvas>
        <div class="legend">
          <span><span class="dot ground"></span> Pawn — Ground floor</span>
          <span><span class="dot top"></span> Pawn — Top corridor</span>
        </div>
      </main>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
